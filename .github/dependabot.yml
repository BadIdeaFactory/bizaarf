version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'globals'
      svelte:
        patterns:
          - 'svelte'
          - 'svelte-*'
          - '@sveltejs/*'
          - '*-svelte'
      vite:
        patterns:
          - 'vite'
          - 'vitest'
          - '@vitest/*'
          - 'jsdom'
      prettier:
        patterns:
          - 'prettier'
          - 'prettier-*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - '*'
