name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual deploys from the Actions tab.
  workflow_dispatch:

# Grant the token the permissions Pages deployment requires.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs in between.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build
        # base_path is the sub-path Pages serves the site from (e.g. /bizaarf/).
        run: npm run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Provide an SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
